# ===============================================
# MEMORY OPTIMIZATION CONFIGURATION
# ===============================================

# ------------------------------
# JVM MEMORY SETTINGS
# ------------------------------
# These should be set as JVM arguments, but documented here for reference
# Production: -Xms2g -Xmx4g -XX:MetaspaceSize=256m -XX:MaxMetaspaceSize=512m
# Development: -Xms1g -Xmx2g -XX:MetaspaceSize=128m -XX:MaxMetaspaceSize=256m

# ------------------------------
# TOMCAT THREAD POOL CONFIGURATION
# ------------------------------
# Maximum number of worker threads
server.tomcat.threads.max=200
# Minimum number of worker threads
server.tomcat.threads.min-spare=25
# Maximum number of connections
server.tomcat.max-connections=8192
# Connection timeout
server.tomcat.connection-timeout=20000
# Accept count (queue size)
server.tomcat.accept-count=100
# Maximum HTTP header size
server.max-http-header-size=8KB
# Maximum HTTP post size
server.tomcat.max-http-post-size=10MB

# ------------------------------
# DATABASE CONNECTION POOL (HikariCP)
# ------------------------------
# Maximum pool size
spring.datasource.hikari.maximum-pool-size=20
# Minimum idle connections
spring.datasource.hikari.minimum-idle=5
# Connection timeout
spring.datasource.hikari.connection-timeout=30000
# Idle timeout (10 minutes)
spring.datasource.hikari.idle-timeout=600000
# Maximum lifetime (30 minutes)
spring.datasource.hikari.max-lifetime=1800000
# Leak detection threshold (60 seconds)
spring.datasource.hikari.leak-detection-threshold=60000
# Pool name for monitoring
spring.datasource.hikari.pool-name=CRM-HikariCP

# ------------------------------
# JPA/HIBERNATE MEMORY OPTIMIZATION
# ------------------------------
# Batch size for inserts/updates
spring.jpa.properties.hibernate.jdbc.batch_size=25
# Order inserts for better batching
spring.jpa.properties.hibernate.order_inserts=true
# Order updates for better batching
spring.jpa.properties.hibernate.order_updates=true
# Batch versioned data
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
# Second level cache (disabled for now)
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
# Query cache (disabled for now)
spring.jpa.properties.hibernate.cache.use_query_cache=false
# Statement cache size
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# ------------------------------
# SPRING BOOT MEMORY SETTINGS
# ------------------------------
# Maximum file size for uploads
spring.servlet.multipart.max-file-size=10MB
# Maximum request size
spring.servlet.multipart.max-request-size=15MB
# File size threshold for writing to disk
spring.servlet.multipart.file-size-threshold=2KB
# Location for temporary files
spring.servlet.multipart.location=${java.io.tmpdir}

# ------------------------------
# JACKSON JSON PROCESSING
# ------------------------------
# Limit string length to prevent memory issues
spring.jackson.parser.limit.string-length=10000000
# Limit number length
spring.jackson.parser.limit.number-length=1000
# Fail on unknown properties (helps catch issues early)
spring.jackson.deserialization.fail-on-unknown-properties=false

# ------------------------------
# ACTUATOR MEMORY MONITORING
# ------------------------------
# Enable memory metrics
management.metrics.enable.jvm=true
management.metrics.enable.system=true
management.metrics.enable.tomcat=true
management.metrics.enable.hikaricp=true

# ------------------------------
# ASYNC PROCESSING
# ------------------------------
# Core pool size for async tasks
spring.task.execution.pool.core-size=5
# Maximum pool size for async tasks
spring.task.execution.pool.max-size=20
# Queue capacity for async tasks
spring.task.execution.pool.queue-capacity=100
# Thread name prefix
spring.task.execution.thread-name-prefix=crm-async-

# ------------------------------
# SCHEDULING THREAD POOL
# ------------------------------
# Pool size for scheduled tasks
spring.task.scheduling.pool.size=5
# Thread name prefix
spring.task.scheduling.thread-name-prefix=crm-scheduler-