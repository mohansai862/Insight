spring.application.name=crm-customer-service
server.port=8081
server.address=0.0.0.0

# Database (local)
spring.datasource.url=jdbc:mysql://30.0.0.78:3306/crms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata&characterEncoding=utf8&useUnicode=true
spring.datasource.username=crms
spring.datasource.password=passw0rd
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# CORS for React local
spring.web.cors.allowed-origins=http://localhost:4201, http://30.0.1.159:4201
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Static resources
spring.web.resources.static-locations=classpath:/static/

# JWT (local)
jwt.secret=mySecretKey12345678901234567890123456789012345678901234567890
jwt.expiration=86400000

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Email Configuration (Development)
spring.mail.host=mail.tammina.in
spring.mail.port=465
spring.mail.username=crms-noreply@tammina.in
spring.mail.password=U9e31N69ZWWN

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=mail.tammina.in
spring.mail.properties.mail.smtp.ssl.checkserveridentity=false
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2

# Optional but recommended timeout settings
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000


# Document Management Configuration
document.upload.directory=uploads/documents/
document.allowed.extensions=pdf,doc,docx,xls,xlsx,ppt,pptx,jpg,jpeg,png,txt
document.max.file.size=10485760

# Asterisk Configuration
asterisk.host=30.0.0.80
asterisk.port=5038
asterisk.username=crmuser
asterisk.password=crmsecret
asterisk.timeout=30000
asterisk.context=from-internal

# ------------------------------
# MEMORY OPTIMIZATION (DEVELOPMENT)
# ------------------------------
# Tomcat thread pool (smaller for dev)
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=10
server.tomcat.max-connections=2048
server.tomcat.connection-timeout=20000
server.tomcat.accept-count=50
server.max-http-header-size=8KB

# Database connection pool (smaller for dev)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.leak-detection-threshold=30000
spring.datasource.hikari.pool-name=CRM-HikariCP-Dev

# JPA/Hibernate optimization
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Async processing (smaller for dev)
spring.task.execution.pool.core-size=3
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=50
spring.task.execution.thread-name-prefix=crm-dev-async-

# Scheduling
spring.task.scheduling.pool.size=3
spring.task.scheduling.thread-name-prefix=crm-dev-scheduler-

# ------------------------------
# LOGGING CONFIGURATION (DEV)
# ------------------------------
# Root logging level
logging.level.root=INFO

# Framework logging
logging.level.org.springframework=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.zaxxer.hikari=WARN
logging.level.org.apache.catalina=WARN
logging.level.org.apache.tomcat=WARN

# Application logging (more verbose in dev)
logging.level.com.techtammina.crm=DEBUG
logging.level.com.techtammina.crm.service=DEBUG
logging.level.com.techtammina.crm.controller=DEBUG
logging.level.com.techtammina.crm.config=DEBUG

# Security logging (verbose for debugging)
logging.level.com.techtammina.crm.service.AuthService=DEBUG
logging.level.com.techtammina.crm.config.JwtAuthenticationFilter=DEBUG

# Business operations logging
logging.level.com.techtammina.crm.service.LeadService=DEBUG
logging.level.com.techtammina.crm.service.DealService=DEBUG
logging.level.com.techtammina.crm.service.EmailService=DEBUG

# Console logging pattern
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{50}:%line - %msg%n

# File logging (optional in dev)
logging.file.path=logs
logging.file.name=logs/crm-dev.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.total-size-cap=500MB