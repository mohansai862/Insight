# ------------------------------
# APPLICATION CORE CONFIGURATION
# ------------------------------
spring.application.name=crm-customer-service
server.port=8081
server.address=0.0.0.0

# ------------------------------
# DATABASE CONFIGURATION (PROD)
# ------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/crms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata&characterEncoding=utf8&useUnicode=true
spring.datasource.username=crms
spring.datasource.password=passw0rd
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ------------------------------
# CORS CONFIGURATION
# ------------------------------
spring.web.cors.allowed-origins=http://crms.tamminahub.com
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# ------------------------------
# STATIC RESOURCE CONFIGURATION
# ------------------------------
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=31536000

# ------------------------------
# JWT CONFIGURATION
# ------------------------------
jwt.secret=mySecretKey12345678901234567890123456789012345678901234567890
jwt.expiration=86400000

# ------------------------------
# SECURITY CONFIGURATION
# ------------------------------
spring.security.require-ssl=false
logging.level.org.springframework.security=INFO

# ------------------------------
# FILE UPLOAD CONFIGURATION
# ------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ------------------------------
# DOCUMENT MANAGEMENT CONFIGURATION
# ------------------------------
document.upload.directory=/opt/techtammina/crm/uploads/documents/
document.allowed.extensions=pdf,doc,docx,xls,xlsx,ppt,pptx,jpg,jpeg,png,txt
document.max.file.size=10485760

# ------------------------------
# EMAIL CONFIGURATION
# ------------------------------
spring.mail.host=mail.tammina.in
spring.mail.port=465
spring.mail.username=crms-noreply@tammina.in
spring.mail.password=U9e31N69ZWWN

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=mail.tammina.in
spring.mail.properties.mail.smtp.ssl.checkserveridentity=false
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2

# Optional but recommended timeout settings
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000


# ------------------------------
# ASTERISK CONFIGURATION
# ------------------------------
asterisk.host=30.0.0.80
asterisk.port=5038
asterisk.username=admin
asterisk.password=crm123
asterisk.timeout=30000
asterisk.context=from-internal

# ------------------------------
# MEMORY OPTIMIZATION (PRODUCTION)
# ------------------------------
# Tomcat thread pool
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=25
server.tomcat.max-connections=8192
server.tomcat.connection-timeout=20000
server.tomcat.accept-count=100
server.max-http-header-size=8KB

# Database connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.pool-name=CRM-HikariCP-Prod

# JPA/Hibernate optimization
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# Async processing
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=crm-async-

# Scheduling
spring.task.scheduling.pool.size=5
spring.task.scheduling.thread-name-prefix=crm-scheduler-

# Memory monitoring
management.metrics.enable.jvm=true
management.metrics.enable.system=true
management.metrics.enable.tomcat=true
management.metrics.enable.hikaricp=true

# ------------------------------
# LOGGING CONFIGURATION
# ------------------------------
# Root logging level
logging.level.root=WARN

# Framework logging
logging.level.org.springframework=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.apache.catalina=WARN
logging.level.org.apache.tomcat=WARN

# Application logging
logging.level.com.techtammina.crm=INFO
logging.level.com.techtammina.crm.service=INFO
logging.level.com.techtammina.crm.controller=INFO
logging.level.com.techtammina.crm.config=INFO

# Security logging (more verbose for audit)
logging.level.com.techtammina.crm.service.AuthService=INFO
logging.level.com.techtammina.crm.config.JwtAuthenticationFilter=INFO

# Business operations logging
logging.level.com.techtammina.crm.service.LeadService=INFO
logging.level.com.techtammina.crm.service.DealService=INFO
logging.level.com.techtammina.crm.service.EmailService=INFO

# Log file configuration
logging.file.path=logs
logging.file.name=logs/crm-application.log
logging.logback.rollingpolicy.max-file-size=100MB
logging.logback.rollingpolicy.max-history=60
logging.logback.rollingpolicy.total-size-cap=5GB

# Log pattern for console (if needed)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50}:%line - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50}:%line - %msg%n